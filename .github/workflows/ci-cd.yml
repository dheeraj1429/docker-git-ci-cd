name: CI CD PIPELINE

on:
    push:
        branches: 
            - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker
        uses: docker/setup-docker-action@v4
      - name: Printing information
        run: docker compose version
      - name: Build docker container
        run: docker compose up -d